name: Build WPF App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore AVP.sln

    - name: Build
      run: dotnet build AVP.sln --configuration Release --no-restore

    - name: Publish (Create Release Artifacts)
      run: dotnet publish AVP/AVP.csproj -c Release -r win-x64 --self-contained false -o ./publish

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AVP-Windows-Release
        path: ./publish
